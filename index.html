<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mateusz Ciechański, CV</title>
  <meta name="description" content="CV Mateusza Ciechańskiego: dyrektor operacyjny i ryzyka, fintech i bankowość.">
  <style>
    :root { --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --accent:#082480; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:#f7f8fa; }
    .wrap { max-width:680px; margin:0 auto; padding:48px 20px 64px; }
    h1 { font-size:28px; margin:0 0 4px; }
    .sub { color:var(--muted); margin:0 0 28px; font-size:15px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px 22px; margin:14px 0; }
    .card h2 { font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin:0 0 12px; }
    a.btn { display:flex; align-items:center; justify-content:space-between; text-decoration:none; color:var(--ink);
      border:1px solid var(--line); border-radius:10px; padding:13px 16px; margin:8px 0; font-weight:600; transition:.15s; }
    a.btn:hover { border-color:var(--accent); color:var(--accent); }
    a.btn small { font-weight:400; color:var(--muted); }
    .foot { color:var(--muted); font-size:13px; margin-top:28px; }
    .foot a { color:var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Mateusz Ciechański</h1>
    <p class="sub">Dyrektor operacyjny i ryzyka, fintech i bankowość. Uruchamianie instytucji kredytowych, automatyzacja decyzji, własne systemy.</p>

    <div class="card">
      <h2>CV do pobrania</h2>
      <a class="btn" href="Mateusz-Ciechanski-CV-PL.pdf">CV po polsku <small>PDF</small></a>
      <a class="btn" href="Mateusz-Ciechanski-CV-EN.pdf">CV in English <small>PDF</small></a>
    </div>

    <div class="card">
      <h2>Wersja prosta (ATS)</h2>
      <a class="btn" href="Mateusz-Ciechanski-CV-ATS-PL.pdf">CV ATS po polsku <small>PDF</small></a>
      <a class="btn" href="Mateusz-Ciechanski-CV-ATS-EN.pdf">CV ATS in English <small>PDF</small></a>
    </div>

    <p class="foot">Kontakt: <a href="mailto:matciechanski@gmail.com">matciechanski@gmail.com</a></p>
  </div>
</body>
</html>
